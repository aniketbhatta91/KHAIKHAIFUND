<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KhaiKhai Fund</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />

  <!-- PWA / installable on phone -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0f1115" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="KhaiKhai" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="logo">₹</span>
        <div>
          <h1>KhaiKhai Fund</h1>
          <p class="tagline">Shared team fund tracker</p>
        </div>
      </div>

      <div class="team">
        <svg class="team-mark" viewBox="0 0 48 48" width="40" height="40" aria-hidden="true">
          <defs>
            <linearGradient id="tm" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#6c8cff"/>
              <stop offset="1" stop-color="#2ecc8f"/>
            </linearGradient>
          </defs>
          <rect x="2" y="2" width="44" height="44" rx="12" fill="url(#tm)"/>
          <!-- mini bar chart + node accent -->
          <rect x="11" y="26" width="5" height="11" rx="2" fill="#0f1115" opacity="0.85"/>
          <rect x="19" y="21" width="5" height="16" rx="2" fill="#0f1115" opacity="0.85"/>
          <rect x="27" y="16" width="5" height="21" rx="2" fill="#0f1115" opacity="0.85"/>
          <circle cx="36" cy="14" r="4.5" fill="#ffffff"/>
          <path d="M13.5 24 L21.5 19 L29.5 14 L36 14" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="13.5" cy="24" r="2.4" fill="#ffffff"/>
          <circle cx="21.5" cy="19" r="2.4" fill="#ffffff"/>
          <circle cx="29.5" cy="14" r="2.4" fill="#ffffff"/>
        </svg>
        <div class="team-text">
          <span class="team-name">Data Science Team</span>
          <span class="team-sub">Analytics &amp; Insights</span>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- Summary cards -->
    <section class="cards">
      <div class="card balance">
        <span class="card-label">Current Balance</span>
        <span class="card-value" id="balance">—</span>
      </div>
      <div class="card collected">
        <span class="card-label">Total Collected</span>
        <span class="card-value" id="collected">—</span>
      </div>
      <div class="card spent">
        <span class="card-label">Total Spent</span>
        <span class="card-value" id="spent">—</span>
      </div>
    </section>

    <!-- Entry form -->
    <section class="panel">
      <div class="tabs">
        <button class="tab active" data-type="donation">+ Donation</button>
        <button class="tab" data-type="expense">– Expense</button>
      </div>

      <form id="entry-form" class="entry-form" autocomplete="off">
        <div class="field">
          <label id="label-label" for="label">Donor name</label>
          <input type="text" id="label" name="label" placeholder="Who donated?" required />
        </div>
        <div class="field">
          <label id="person-label" for="person">Received by</label>
          <input type="text" id="person" name="person" placeholder="Who recorded it?" required />
        </div>
        <div class="field">
          <label for="amount">Amount</label>
          <input type="number" id="amount" name="amount" min="0.01" step="0.01" placeholder="0.00" required />
        </div>
        <div class="field">
          <label for="date">Date</label>
          <input type="date" id="date" name="date" required />
        </div>
        <div class="field field-wide">
          <label for="note">Note <span class="muted">(optional)</span></label>
          <input type="text" id="note" name="note" placeholder="Anything to remember?" />
        </div>
        <div class="field field-submit">
          <button type="submit" id="submit-btn" class="btn-primary">Add donation</button>
        </div>
      </form>
      <p id="form-msg" class="form-msg" role="status"></p>
    </section>

    <!-- Ledger -->
    <section class="panel">
      <div class="ledger-head">
        <h2>Transaction Ledger</h2>
        <div class="ledger-actions">
          <div class="filters" id="filters">
            <button class="chip active" data-filter="all">All</button>
            <button class="chip" data-filter="donation">Donations</button>
            <button class="chip" data-filter="expense">Expenses</button>
          </div>
          <button type="button" id="export-btn" class="btn-export" title="Download full history as Excel">
            <span aria-hidden="true">⬇</span> Export Excel
          </button>
        </div>
      </div>
      <div class="table-wrap">
        <table class="ledger">
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
              <th>Name / Reason</th>
              <th>Person</th>
              <th>Note</th>
              <th class="num">Amount</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="ledger-body"></tbody>
        </table>
        <p id="empty-state" class="empty">No transactions yet. Add the first one above.</p>
      </div>
    </section>
  </main>

  <footer class="foot">KhaiKhai Fund · Flask + SQLite</footer>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/service-worker.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
