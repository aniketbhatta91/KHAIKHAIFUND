<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2140"/>
      <stop offset="0.55" stop-color="#3a2a3f"/>
      <stop offset="1" stop-color="#4a3326"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.2" r="0.8">
      <stop offset="0" stop-color="#ffcf8b" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffcf8b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="table" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#caa37a"/>
      <stop offset="1" stop-color="#9c7550"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="1440" height="600" fill="url(#sky)"/>
  <ellipse cx="720" cy="120" rx="720" ry="260" fill="url(#glow)"/>

  <!-- string lights -->
  <path d="M0,70 Q360,150 720,80 T1440,90" fill="none" stroke="#ffe0a3" stroke-opacity="0.35" stroke-width="2"/>
  <g fill="#ffd87a">
    <circle cx="120" cy="98" r="5"/><circle cx="300" cy="120" r="5"/><circle cx="480" cy="112" r="5"/>
    <circle cx="660" cy="92" r="5"/><circle cx="840" cy="92" r="5"/><circle cx="1020" cy="104" r="5"/>
    <circle cx="1200" cy="100" r="5"/><circle cx="1380" cy="92" r="5"/>
  </g>

  <!-- soft bokeh -->
  <g fill="#ffce86" fill-opacity="0.10">
    <circle cx="190" cy="220" r="40"/><circle cx="1260" cy="180" r="55"/>
    <circle cx="980" cy="250" r="30"/><circle cx="430" cy="200" r="26"/>
  </g>

  <!-- ===== People behind the table ===== -->
  <!-- person 1 -->
  <g>
    <rect x="120" y="320" width="150" height="170" rx="60" fill="#3f6f8f"/>
    <circle cx="195" cy="300" r="46" fill="#e8b58c"/>
    <path d="M150,292 a45,45 0 0 1 90,0 q-45,-30 -90,0z" fill="#3a2c25"/>
  </g>
  <!-- person 2 (raising a glass) -->
  <g>
    <rect x="330" y="330" width="150" height="160" rx="60" fill="#b5544e"/>
    <circle cx="405" cy="300" r="46" fill="#c98d63"/>
    <path d="M360,294 a45,45 0 0 1 90,0 q-45,-26 -90,0z" fill="#241a16"/>
    <rect x="470" y="250" width="18" height="40" rx="4" fill="#8fd0ff" fill-opacity="0.85"/>
    <ellipse cx="479" cy="250" rx="12" ry="5" fill="#cdeaff"/>
    <rect x="452" y="288" width="40" height="20" rx="10" fill="#c98d63"/>
  </g>
  <!-- person 3 -->
  <g>
    <rect x="645" y="318" width="160" height="175" rx="64" fill="#5b8f6a"/>
    <circle cx="725" cy="298" r="48" fill="#a9714c"/>
    <path d="M676,292 a49,49 0 0 1 98,0 q-49,-32 -98,0z" fill="#2a1d16"/>
  </g>
  <!-- person 4 (raising a glass) -->
  <g>
    <rect x="900" y="330" width="150" height="160" rx="60" fill="#8a6bb0"/>
    <circle cx="975" cy="300" r="46" fill="#edc09a"/>
    <path d="M930,296 a45,45 0 0 1 90,0 q-45,-24 -90,0z" fill="#46342a"/>
    <rect x="892" y="250" width="18" height="40" rx="4" fill="#ffd27a" fill-opacity="0.9"/>
    <ellipse cx="901" cy="250" rx="12" ry="5" fill="#ffe6b0"/>
    <rect x="888" y="288" width="40" height="20" rx="10" fill="#edc09a"/>
  </g>
  <!-- person 5 -->
  <g>
    <rect x="1130" y="322" width="155" height="170" rx="62" fill="#c98a3c"/>
    <circle cx="1207" cy="300" r="46" fill="#d79b6f"/>
    <path d="M1162,294 a45,45 0 0 1 90,0 q-45,-28 -90,0z" fill="#231812"/>
  </g>

  <!-- ===== Table ===== -->
  <rect x="0" y="470" width="1440" height="130" fill="url(#table)"/>
  <rect x="0" y="470" width="1440" height="14" fill="#e7c79c" fill-opacity="0.5"/>

  <!-- place settings: plates with food, cups -->
  <g>
    <!-- plate group helper repeated -->
    <g transform="translate(195,505)">
      <ellipse cx="0" cy="0" rx="70" ry="24" fill="#f4f0e8"/>
      <ellipse cx="0" cy="-3" rx="46" ry="15" fill="#e07a4d"/>
      <circle cx="-12" cy="-4" r="6" fill="#6cbf6c"/><circle cx="14" cy="-2" r="5" fill="#f2c14e"/>
      <ellipse cx="86" cy="-6" rx="12" ry="16" fill="#ffd87a"/>
    </g>
    <g transform="translate(405,512)">
      <ellipse cx="0" cy="0" rx="70" ry="24" fill="#f4f0e8"/>
      <ellipse cx="0" cy="-3" rx="46" ry="15" fill="#c64b3b"/>
      <circle cx="-10" cy="-4" r="6" fill="#f2c14e"/><circle cx="16" cy="-3" r="5" fill="#6cbf6c"/>
      <ellipse cx="-88" cy="-6" rx="11" ry="15" fill="#8fd0ff"/>
    </g>
    <g transform="translate(725,508)">
      <ellipse cx="0" cy="0" rx="74" ry="26" fill="#f4f0e8"/>
      <ellipse cx="0" cy="-4" rx="50" ry="16" fill="#e89a3c"/>
      <circle cx="-14" cy="-5" r="6" fill="#6cbf6c"/><circle cx="12" cy="-3" r="6" fill="#c64b3b"/>
      <path d="M0,-30 q6,-14 0,-26" stroke="#ffffff" stroke-opacity="0.25" stroke-width="4" fill="none"/>
    </g>
    <g transform="translate(975,512)">
      <ellipse cx="0" cy="0" rx="70" ry="24" fill="#f4f0e8"/>
      <ellipse cx="0" cy="-3" rx="46" ry="15" fill="#d8693f"/>
      <circle cx="-12" cy="-4" r="6" fill="#f2c14e"/><circle cx="14" cy="-2" r="5" fill="#6cbf6c"/>
      <ellipse cx="88" cy="-6" rx="11" ry="15" fill="#ffd87a"/>
    </g>
    <g transform="translate(1207,506)">
      <ellipse cx="0" cy="0" rx="72" ry="25" fill="#f4f0e8"/>
      <ellipse cx="0" cy="-3" rx="48" ry="15" fill="#cf5a3a"/>
      <circle cx="-12" cy="-4" r="6" fill="#6cbf6c"/><circle cx="14" cy="-2" r="6" fill="#f2c14e"/>
      <ellipse cx="-90" cy="-6" rx="11" ry="15" fill="#8fd0ff"/>
    </g>
  </g>
</svg>
